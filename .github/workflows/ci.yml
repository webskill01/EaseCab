name: CI

# Quality gate — must pass before merge. Mirrors CLAUDE.md §11:
# install -> lint -> test (with coverage gate) -> build.
# Any failing test or sub-threshold coverage fails the build.

on:
  pull_request:
    branches: [main]
  # Push-triggered runs are scoped to main only — the full gate fires on PRs into
  # main (above). Day-to-day feature/** pushes no longer spin CI (saves minutes and
  # avoids per-push failure emails); open a PR to run the gate.
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Public-by-design Firebase web config (CLAUDE.md §3 note in apps/web/config/env.js):
    # these only satisfy the build-time NEXT_PUBLIC_* schema for the verification build.
    # NOT secrets — the real values inject at deploy on the VPS. Keep in sync if the
    # web env schema gains required keys.
    env:
      NEXT_PUBLIC_API_URL: https://api.easecab.com/api/v1
      NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: easecab.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: easecab-ci
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '0000000000'
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:0000000000:web:ci0000000000000000
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: ci-placeholder-vapid-key
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20' # matches engines.node and the VPS runtime (not the dev machine's 24)
          cache: npm

      - name: Install (clean, lockfile-pinned)
        run: npm ci

      # Generate Prisma client so any workspace importing @prisma/client builds/tests cleanly.
      - name: Prisma generate
        run: npm run prisma:generate --workspace=packages/api

      - name: Lint
        run: npm run lint

      # Coverage gate: c8 --check-coverage exits non-zero below thresholds (see each package).
      - name: Test + coverage gate
        run: npm run test:coverage

      - name: Build web
        run: npm run build:web
