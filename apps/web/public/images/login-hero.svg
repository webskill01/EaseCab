<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 412 288" fill="none" role="img" aria-label="Taxi" preserveAspectRatio="xMidYMid slice">
  <!-- PLACEHOLDER taxi hero — swap this file with a real cab/driver photo (same path) later. -->
  <rect width="412" height="288" fill="#2C5BD8"/>
  <rect width="412" height="288" fill="#1E3A8A" opacity="0.30"/>

  <!-- road -->
  <rect x="0" y="232" width="412" height="56" fill="#0F1F4D" opacity="0.55"/>
  <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.35" stroke-dasharray="22 20">
    <line x1="8" y1="262" x2="404" y2="262"/>
  </g>

  <!-- taxi -->
  <g>
    <!-- body -->
    <path d="M96 196 L112 150 Q116 138 130 138 L210 138 L246 110 Q252 106 262 106 L292 106 Q304 106 310 118 L326 150 L344 156 Q356 160 356 174 L356 196 Z" fill="#F7B500"/>
    <path d="M96 196 L356 196 L356 206 Q356 212 350 212 L102 212 Q96 212 96 206 Z" fill="#E0A100"/>
