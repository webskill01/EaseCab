    <text x="218" y="105" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1E293B" text-anchor="middle">TAXI</text>
    <!-- windows -->
    <path d="M134 150 L154 150 L154 138 L138 138 Q132 138 132 144 Z" fill="#BFE0FF"/>
    <path d="M162 150 L206 150 L206 138 L162 138 Z" fill="#BFE0FF"/>
    <path d="M214 150 L300 150 L290 120 Q286 114 278 114 L250 114 L214 138 Z" fill="#BFE0FF"/>
    <!-- checker stripe -->
    <g fill="#1E293B">
      <rect x="96" y="178" width="14" height="9"/><rect x="124" y="178" width="14" height="9"/>
      <rect x="152" y="178" width="14" height="9"/><rect x="180" y="178" width="14" height="9"/>
      <rect x="208" y="178" width="14" height="9"/><rect x="236" y="178" width="14" height="9"/>
      <rect x="264" y="178" width="14" height="9"/><rect x="292" y="178" width="14" height="9"/>
      <rect x="320" y="178" width="14" height="9"/>
      <rect x="110" y="187" width="14" height="9"/><rect x="138" y="187" width="14" height="9"/>
      <rect x="166" y="187" width="14" height="9"/><rect x="194" y="187" width="14" height="9"/>
      <rect x="222" y="187" width="14" height="9"/><rect x="250" y="187" width="14" height="9"/>
      <rect x="278" y="187" width="14" height="9"/><rect x="306" y="187" width="14" height="9"/>
    </g>
    <!-- wheels -->
    <circle cx="150" cy="212" r="22" fill="#1E293B"/><circle cx="150" cy="212" r="9" fill="#94A3B8"/>
    <circle cx="304" cy="212" r="22" fill="#1E293B"/><circle cx="304" cy="212" r="9" fill="#94A3B8"/>
    <!-- headlight -->
    <circle cx="350" cy="184" r="5" fill="#FFF6D6"/>
