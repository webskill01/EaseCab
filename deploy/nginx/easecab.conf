# EaseCab — Nginx reverse proxy (Phase 9c)
#
# Fronts the three PM2 apps (ecosystem.config.js) on one Contabo VPS:
#   easecab.com        → web   :3000
#   api.easecab.com    → api   :4000   (Express + SSE)
#   admin.easecab.com  → admin :5000
#
# Install:
#   sudo cp deploy/nginx/easecab.conf /etc/nginx/sites-available/easecab.conf
#   sudo ln -sf /etc/nginx/sites-available/easecab.conf /etc/nginx/sites-enabled/easecab.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS is issued/renewed by certbot (see docs/DEPLOY.md). On the FIRST run certbot
# rewrites the :443 blocks below with the real cert paths and adds the redirect — so
# you can either let certbot manage them (`--nginx`) or keep them here verbatim and
# use `certbot --webroot`. This file is written for the webroot flow (paths below
# match `certbot certonly --webroot -w /var/www/certbot`).
#
# Upstream ports mirror ecosystem.config.js. Staging runs as SEPARATE server blocks
# on the *-staging subdomains → :3100/:4100/:5100 (see docs/STAGING.md) — not here.

# ---- HTTP : ACME challenge + force HTTPS ------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name easecab.com api.easecab.com admin.easecab.com;

    # Let's Encrypt webroot challenge — must stay reachable over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- shared proxy + TLS snippets -------------------------------------------
# (kept inline rather than as include files so this is a single drop-in conf)

# ---- WEB : easecab.com → :3000 ---------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name easecab.com;

    ssl_certificate     /etc/letsencrypt/live/easecab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easecab.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # PWA assets can be large-ish; profile pics/chat images go through the API, not here.
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# ---- API : api.easecab.com → :4000 (Express + SSE) -------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name api.easecab.com;

    ssl_certificate     /etc/letsencrypt/live/easecab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easecab.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Server-side file-size ceiling matches CLAUDE.md §6 (KYC docs / chat images = 10MB);
    # the API still re-validates size + MIME server-side. 11m leaves multipart overhead.
    client_max_body_size 11m;

    # SSE ride feed (CLAUDE.md §12) — buffering OFF so events flush immediately, and a
    # read timeout comfortably longer than the 30s app heartbeat so idle streams survive
    # behind Nginx. The API also sends `X-Accel-Buffering: no`, but pin it here too.
    location = /api/v1/rides/stream {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }
}

# ---- ADMIN : admin.easecab.com → :5000 -------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl;
    server_name admin.easecab.com;

    ssl_certificate     /etc/letsencrypt/live/easecab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/easecab.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
